<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NowTime</title>
<style>
:root{--bg:#0f1724;--card:#0b1220;--accent:#7c5cff;--muted:#9aa4b2}

html,body{
  height:100%;margin:0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  background:linear-gradient(180deg,#071029,#0f1724);
  color:#e6eef8;
}

.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:720px;
  background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
  border-radius:12px;
  padding:24px;
  text-align:center;
  box-shadow:0 6px 24px rgba(2,6,23,0.6);
}

/* 日付（タイトル部分） */
.date{
  font-size:20px;
  margin-bottom:16px;
  color:#e6eef8;
  font-variant-numeric: tabular-nums;
}

/* 現在時刻（揺れゼロ） */
.time{
  font-size:64px;
  font-weight:700;
  letter-spacing:0.02em;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  font-variant-numeric: tabular-nums;
}

@media(max-width:520px){
  .time{font-size:48px}
  .card{padding:18px}
  .date{font-size:18px}
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div id="date" class="date">----/--/-- ---</div>
    <div id="now" class="time">--:--:--</div>
  </div>
</div>

<script>
(() => {
  const nowEl = document.getElementById('now');
  const dateEl = document.getElementById('date');

  const pad = n => String(n).padStart(2,'0');
  const week = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function update(){
    const d = new Date();

    // 時刻
    const h = pad(d.getHours());
    const m = pad(d.getMinutes());
    const s = pad(d.getSeconds());
    nowEl.textContent = `${h}:${m}:${s}`;

    // 日付（YYYY/MM/DD Tue）
    const y = d.getFullYear();
    const mo = pad(d.getMonth()+1);
    const da = pad(d.getDate());
    const wd = week[d.getDay()];
    dateEl.textContent = `${y}/${mo}/${da} ${wd}`;
  }

  update();
  setInterval(update, 500);
})();
</script>
</body>
</html>
