<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Timer</title>
<style>
:root{--bg:#0f1724;--card:#0b1220;--accent:#7c5cff;--muted:#9aa4b2}

html,body{
  height:100%;margin:0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  background:linear-gradient(180deg,#071029,#0f1724);
  color:#e6eef8;
}

.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:720px;
  background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
  border-radius:12px;
  padding:18px;
  text-align:center;
  box-shadow:0 6px 24px rgba(2,6,23,0.6);
}

.title{
  font-size:18px;
  margin:0 0 12px 0;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:12px;
}

input[type="time"]{
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);
  color:var(--accent);
  min-width:150px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:0;
  background:linear-gradient(90deg,var(--accent),#5ad0ff);
  color:#041025;
  font-weight:600;
  cursor:pointer;
}

button.ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,0.06);
  color:var(--muted);
}

.display{
  margin-top:18px;
  padding:14px;
  border-radius:10px;
  background:rgba(255,255,255,0.02);
}

/* 揺れゼロの数字 */
.time{
  font-size:48px;
  font-weight:700;
  letter-spacing:0.02em;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  font-variant-numeric: tabular-nums;
}

.label{
  color:var(--muted);
  margin-top:6px;
  font-size:13px;
}

.elapsed{
  color:#ff6b6b;
}

@media(max-width:520px){
  .time{font-size:36px}
  input[type="time"]{min-width:120px}
  .card{padding:14px}
}
</style>
</head>
<body>
<div class="container">
  <main class="card">
    <h1 class="title">Timer</h1>

    <div class="controls">
      <input id="timeInput" type="time" step="1">
      <button id="startBtn">開始</button>
      <button id="resetBtn" class="ghost">リセット</button>
    </div>

    <div class="display">
      <div id="timeText" class="time">--:--:--</div>
      <div id="status" class="label">終了時刻を指定して開始してください</div>
    </div>
  </main>
</div>

<script>
(() => {
  const timeInput = document.getElementById('timeInput');
  const startBtn  = document.getElementById('startBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const timeText  = document.getElementById('timeText');
  const status    = document.getElementById('status');

  let timer = null;
  let target = null;
  let isNextDay = false;

  const pad = n => String(n).padStart(2,'0');

  const formatSpan = ms => {
    const s = Math.floor(Math.abs(ms)/1000);
    return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
  };

  function parseToTarget(val){
    const [h,m,s] = val.split(':').map(v => parseInt(v,10));
    if(isNaN(h)||isNaN(m)) return null;

    const now = new Date();
    const t = new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,s||0);

    if(t <= now){
      t.setDate(t.getDate()+1);
      return {d:t,next:true};
    }
    return {d:t,next:false};
  }

  function update(){
    if(!target) return;

    const diff = target - new Date();
    timeText.textContent = formatSpan(diff);

    if(diff >= 0){
      timeText.classList.remove('elapsed');
      status.textContent = '残り時間';
    } else {
      timeText.classList.add('elapsed');
      status.textContent = '経過時間';
    }
  }

  function start(){
    const parsed = parseToTarget(timeInput.value);
    if(!parsed){
      alert('有効な時刻を選んでください');
      return;
    }

    target = parsed.d;
    isNextDay = parsed.next;

    if(timer) clearInterval(timer);
    update();
    timer = setInterval(update, 500);

    startBtn.disabled = true;
  }

  function reset(){
    if(timer) clearInterval(timer);

    timer = null;
    target = null;
    isNextDay = false;

    timeText.textContent = '--:--:--';
    timeText.classList.remove('elapsed');
    status.textContent = '終了時刻を指定して開始してください';

    startBtn.disabled = false;
  }

  // 初期値：1分後
  (() => {
    const d = new Date(Date.now()+60000);
    timeInput.value = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  })();

  startBtn.addEventListener('click', start);
  resetBtn.addEventListener('click', reset);
  timeInput.addEventListener('keydown', e => { if(e.key==='Enter') start(); });
})();
</script>
</body>
</html>
